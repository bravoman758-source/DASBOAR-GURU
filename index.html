<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Guru - SMA Taruna Muhammadiyah Riau</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

html {
  scroll-behavior: smooth;
}

body {
  background: #f1f5f9;
  color: #1e293b;
}

/* Navbar */
.navbar {
  background: #15803d;
  color: white;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
}

.menu a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  font-size: 14px;
}

/* Container */
.container {
  padding: 30px;
}

.section {
  margin-top: 30px;
}

/* Cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.card p {
  font-size: 22px;
  font-weight: bold;
  color: #15803d;
}

/* Box */
.box {
  background: white;
  padding: 20px;
  border-radius: 15px;
  margin-top: 15px;
}

table {
  width: 100%;
  margin-top: 10px;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  background: #15803d;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.status-hadir { color: green; }
.status-izin { color: orange; }
.status-alpha { color: red; }

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h3>SMA Taruna Muhammadiyah Riau</h3>
  <div class="menu">
    <a href="#beranda">Beranda</a>
    <a href="#jadwal">Jadwal</a>
    <a href="#nilai">Nilai</a>
    <a href="#absensi">Absensi</a>
  </div>
</div>

<div class="container">

  <!-- BERANDA -->
  <div id="beranda" class="section">
    <h2>Assalamu’alaikum, Selamat Datang Guru 👋</h2>

    <div class="cards">
      <div class="card">
        Total Siswa
        <p>120</p>
      </div>
      <div class="card">
        Jadwal Hari Ini
        <p>5 Kelas</p>
      </div>
      <div class="card">
        Tugas Belum Dinilai
        <p>8</p>
      </div>
      <div class="card">
        Kehadiran
        <p>95%</p>
      </div>
    </div>
  </div>

  <!-- JADWAL -->
  <div id="jadwal" class="section">
    <h2>Jadwal Mengajar</h2>
    <div class="box">
      <table>
        <tr>
          <th>Jam</th>
          <th>Mapel</th>
          <th>Kelas</th>
        </tr>
        <tr>
          <td>08:00</td>
          <td>Matematika</td>
          <td>X IPA 1</td>
        </tr>
        <tr>
          <td>09:30</td>
          <td>Fisika</td>
          <td>X IPA 2</td>
        </tr>
      </table>
    </div>
  </div>

  <!-- NILAI -->
  <div id="nilai" class="section">
    <h2>Input Nilai</h2>
    <div class="box">
      <input type="text" id="nama" placeholder="Nama Siswa">
      <input type="text" id="mapel" placeholder="Mata Pelajaran">
      <input type="number" id="nilaiInput" placeholder="Nilai">
      <button onclick="simpanNilai()">Simpan</button>

      <div id="listNilai"></div>
    </div>
  </div>

  <!-- ABSENSI -->
  <div id="absensi" class="section">
    <h2>Absensi</h2>
    <div class="box">
      <select id="absen">
        <option>Hadir</option>
        <option>Izin</option>
        <option>Tidak Hadir</option>
      </select>
      <button onclick="absensi()">Simpan</button>
      <p id="status"></p>
    </div>
  </div>

</div>

<script>
let dataNilai = [];

function simpanNilai() {
  let nama = document.getElementById("nama").value;
  let mapel = document.getElementById("mapel").value;
  let nilai = document.getElementById("nilaiInput").value;

  dataNilai.push({nama, mapel, nilai});
  tampilNilai();
}

function tampilNilai(){
  let html = "";
  dataNilai.forEach(d => {
    html += `<p>${d.nama} - ${d.mapel} (${d.nilai})</p>`;
  });
  document.getElementById("listNilai").innerHTML = html;
}

function absensi() {
  let absen = document.getElementById("absen").value;
  let status = document.getElementById("status");

  if(absen == "Hadir"){
    status.innerHTML = "Status: Hadir";
    status.className = "status-hadir";
  } else if(absen == "Izin"){
    status.innerHTML = "Status: Izin";
    status.className = "status-izin";
  } else {
    status.innerHTML = "Status: Tidak Hadir";
    status.className = "status-alpha";
  }
}
</script>

</body>
</html>
